<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Admin Panel - La Kyan Myae</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .stats-card { background: #1a73e8; color: white; padding: 10px 20px; border-radius: 8px; font-size: 18px; }
        .btn-excel { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-excel:hover { background: #219150; }
        .btn-logout { background: #666; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background-color: #1a73e8; color: white; }
        .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-delete:hover { background: #c0392b; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        #access-denied { display: none; text-align: center; padding: 50px; color: red; }
        #admin-content { display: none; }
    </style>
</head>
<body>

<div id="access-denied">
    <h1>Access Denied</h1>
    <p>You do not have permission to view this page.</p>
    <button onclick="logout()">Back to Login</button>
</div>

<div id="admin-content" class="container">
    <div class="header-flex">
        <h2>Student Management System</h2>
        <div class="stats-card">Total Students: <span id="studentCount">0</span></div>
        <div>
            <button class="btn-excel" onclick="exportToExcel()">Export to Excel</button>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <table id="studentTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Submission Date</th>
                <th>Submitted By (Email)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div id="loading" style="text-align:center; padding: 20px;">Fetching records...</div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDFVm4Qht1XHdkimbHX4lcvoBVoEao99cQ",
        authDomain: "la-kyan-myae---learning.firebaseapp.com",
        projectId: "la-kyan-myae---learning",
        storageBucket: "la-kyan-myae---learning.firebasestorage.app",
        messagingSenderId: "1083286079212",
        appId: "1:1083286079212:web:330dea4d4dc115cf8747c9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const adminUID = "qJoqOXQcyNarDuwpDacByJdPcvj1";

    // 1. Security Check (UID Verification)
    auth.onAuthStateChanged((user) => {
        if (user) {
            if (user.uid === adminUID) {
                // Admin confirmed
                document.getElementById('admin-content').style.display = 'block';
                document.getElementById('access-denied').style.display = 'none';
                startListening();
            } else {
                // Not Admin
                document.getElementById('admin-content').style.display = 'none';
                document.getElementById('access-denied').style.display = 'block';
            }
        } else {
            // Not Logged In
            window.location.href = "login.html"; 
        }
    });

    // 2. Real-time Data Listener
    function startListening() {
        db.collection("students").orderBy("date", "desc").onSnapshot((querySnapshot) => {
            const tableBody = document.getElementById('tableBody');
            const countSpan = document.getElementById('studentCount');
            const loading = document.getElementById('loading');
            
            tableBody.innerHTML = "";
            countSpan.innerText = querySnapshot.size;
            
            if (querySnapshot.empty) {
                loading.innerText = "No students registered yet.";
                loading.style.display = "block";
            } else {
                loading.style.display = "none";
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const row = `<tr>
                        <td>${data.studentName || 'N/A'}</td>
                        <td>${data.phoneNumber || 'N/A'}</td>
                        <td>${data.date || 'N/A'}</td>
                        <td>${data.submittedBy || 'Unknown'}</td>
                        <td><button class="btn-delete" onclick="deleteStudent('${doc.id}')">Delete</button></td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            }
        }, (error) => {
            console.error("Permission error: ", error);
            document.getElementById('loading').innerText = "Permission Denied. Check Firestore Rules.";
        });
    }

    // 3. Delete Function
    function deleteStudent(docId) {
        if (confirm("Are you sure you want to delete this record?")) {
            db.collection("students").doc(docId).delete().then(() => {
                alert("Deleted successfully.");
            }).catch((error) => {
                alert("Error deleting: " + error.message);
            });
        }
    }

    // 4. Excel Export Function
    function exportToExcel() {
        const table = document.getElementById("studentTable");
        const wb = XLSX.utils.table_to_book(table, {sheet: "Students Registration"});
        XLSX.writeFile(wb, "Student_Registration_List.xlsx");
    }

    // 5. Logout Function
    function logout() {
        auth.signOut().then(() => {
            window.location.href = "login.html";
        });
    }
</script>
</body>
</html>
