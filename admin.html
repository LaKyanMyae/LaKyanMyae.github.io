<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Kyan Myae - Unified Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .source-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #eee; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>ကျောင်းသားစာရင်း (Unified Admin)</h2>
    <table id="studentTable">
        <thead>
            <tr>
                <th>အမည်</th>
                <th>ဖုန်းနံပါတ်</th>
                <th>ပို့သည့်အချိန်</th>
                <th>ပို့သည့်နေရာ (Email)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
    <div id="loading" style="text-align:center; padding: 20px;">အချက်အလက်များကို စုစည်းနေပါသည်...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDFVm4Qht1XHdkimbHX4lcvoBVoEao99cQ",
        authDomain: "la-kyan-myae---learning.firebaseapp.com",
        projectId: "la-kyan-myae---learning",
        storageBucket: "la-kyan-myae---learning.firebasestorage.app",
        messagingSenderId: "1083286079212",
        appId: "1:1083286079212:web:330dea4d4dc115cf8747c9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Firestore ထဲက 'students' collection ကို Real-time စောင့်ကြည့်ခြင်း
    db.collection("students").orderBy("date", "desc").onSnapshot((querySnapshot) => {
        const tableBody = document.getElementById('tableBody');
        const loading = document.getElementById('loading');
        tableBody.innerHTML = "";
        
        if (querySnapshot.empty) {
            loading.innerText = "စာရင်းသွင်းထားသော ကျောင်းသား မရှိသေးပါ။";
        } else {
            loading.style.display = "none";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const row = `<tr>
                    <td><strong>${data.studentName || 'N/A'}</strong></td>
                    <td>${data.phoneNumber || 'N/A'}</td>
                    <td>${data.date || 'N/A'}</td>
                    <td><span class="source-tag">${data.submittedBy || 'Unknown'}</span></td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }
    }, (error) => {
        console.error("Error fetching data: ", error);
        document.getElementById('loading').innerText = "ဒေတာဖတ်မရပါ။ Rules ကို စစ်ဆေးပါ။";
    });
</script>
</body>
</html>
