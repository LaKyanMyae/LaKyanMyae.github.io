<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - La Kyan Myae</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 30px; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border: 1px solid #eee; text-align: left; }
        th { background-color: #1a73e8; color: white; font-weight: normal; }
        tr:hover { background-color: #f8f9fa; }
        .no-data { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>ကျောင်းသားစာရင်း (Admin Panel)</h2>
    <table id="studentTable">
        <thead>
            <tr>
                <th>အမည်</th>
                <th>ဖုန်းနံပါတ်</th>
                <th>ပို့သည့်အချိန်</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
    <div id="loading" class="no-data">အချက်အလက်များကို ရယူနေပါသည်...</div>
</div>

<script>
    // သင့်ရဲ့ Firebase Config အသစ် (Asia Southeast Region)
    const firebaseConfig = {
        apiKey: "AIzaSyDFVm4Qht1XHdkimbHX4lcvoBVoEao99cQ",
        authDomain: "la-kyan-myae---learning.firebaseapp.com",
        databaseURL: "https://la-kyan-myae---learning-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "la-kyan-myae---learning",
        storageBucket: "la-kyan-myae---learning.firebasestorage.app",
        messagingSenderId: "1083286079212",
        appId: "1:1083286079212:web:330dea4d4dc115cf8747c9",
        measurementId: "G-2B6RPZJV1B"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Database ထဲက အချက်အလက်များကို Root ('/') ကနေ တိုက်ရိုက်ဖတ်ခြင်း
    const tableBody = document.getElementById('tableBody');
    const loadingDiv = document.getElementById('loading');

    database.ref('/').on('value', (snapshot) => {
        tableBody.innerHTML = "";
        if (snapshot.exists()) {
            loadingDiv.style.display = "none";
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                
                // ဒေတာထဲမှာ အမည်နဲ့ ဖုန်းနံပါတ် ရှိမရှိ စစ်ဆေးခြင်း
                if(data.name && data.phone) {
                    const row = `<tr>
                        <td>${data.name}</td>
                        <td>${data.phone}</td>
                        <td>${data.timestamp ? new Date(data.timestamp).toLocaleString() : 'N/A'}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                }
            });
            
            // အကယ်၍ students အောက်မှာ ဒေတာမရှိရင် (ဥပမာ students group သီးသန့်ရှိရင်)
            if (tableBody.innerHTML === "") {
                const studentsRef = snapshot.child('students');
                studentsRef.forEach((studentSnapshot) => {
                    const data = studentSnapshot.val();
                    const row = `<tr>
                        <td>${data.name}</td>
                        <td>${data.phone}</td>
                        <td>${data.timestamp ? new Date(data.timestamp).toLocaleString() : 'N/A'}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            }
        } else {
            loadingDiv.innerText = "စာရင်းသွင်းထားသော ကျောင်းသား မရှိသေးပါ။";
        }
    }, (error) => {
        console.error("Database Error: ", error);
        loadingDiv.innerText = "Error: Database Access Denied (Rule ကို စစ်ဆေးပါ)။";
    });
</script>

</body>
</html>
